name: Build and Push Docker Image

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0

      - name: Login to Docker Hub
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Fetch latest PyPI version
        id: pypi
        run: |
          LATEST=$(curl -s https://pypi.org/pypi/nanobot-ai/json | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['version'])")
          echo "tag_name=$LATEST" >> $GITHUB_OUTPUT

      - name: Check if image exists on Docker Hub
        id: exists
        run: |
          if docker manifest inspect mitexleo/nanobot-docker:${{ steps.pypi.outputs.tag_name }} > /dev/null 2>&1; then
            echo "image_exists=true" >> $GITHUB_OUTPUT
          else
            echo "image_exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract metadata for Docker
        if: steps.exists.outputs.image_exists == 'false'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: mitexleo/nanobot-docker
          tags: |
            type=raw,value=${{ steps.pypi.outputs.tag_name }}
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.exists.outputs.image_exists == 'false'
        uses: docker/build-push-action@v7.1.0
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            NANOBOT_VERSION=${{ steps.pypi.outputs.tag_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Summary
        run: |
          if [ "${{ steps.exists.outputs.image_exists }}" == "true" ]; then
            echo "Skipped — mitexleo/nanobot-docker:${{ steps.pypi.outputs.tag_name }} already exists."
          else
            echo "Built and pushed mitexleo/nanobot-docker:${{ steps.pypi.outputs.tag_name }} and latest."
          fi
