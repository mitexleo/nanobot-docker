# =============================================================================
# nanobot-docker — Docker Compose
# https://github.com/mitexleo/nanobot-docker
#
# Services:
#   nanobot-gateway  — persistent channel gateway (runs 24/7)
#   nanobot-cli      — one-shot / interactive CLI (--rm by default)
#
# First-time setup:
#   1. cp .env.example .env   → fill in your API keys
#   2. docker compose run --rm nanobot-cli onboard   → generates ~/.nanobot/config.json
#   3. docker compose up -d nanobot-gateway          → starts the gateway
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # nanobot-gateway — persistent service, auto-restarts
  # ---------------------------------------------------------------------------
  nanobot-gateway:
    image: mitexleo/nanobot-docker:latest
    container_name: nanobot-gateway
    restart: unless-stopped
    ports:
      # Gateway webhook port (receives events from Telegram/Discord/etc.)
      - "${GATEWAY_PORT:-18790}:18790"
      # OpenAI-compatible API server (optional)
      - "${API_PORT:-8900}:8900"
    environment:
      # Agent defaults
      - NANOBOT_AGENTS__DEFAULTS__MODEL=${NANOBOT_MODEL:-anthropic/claude-sonnet-4-7}
      - NANOBOT_AGENTS__DEFAULTS__PROVIDER=${NANOBOT_PROVIDER:-openrouter}
      - NANOBOT_AGENTS__DEFAULTS__TIMEZONE=${NANOBOT_TIMEZONE:-UTC}
      # Providers — add your API keys via .env
      - NANOBOT_PROVIDERS__OPENROUTER__APIKEY=${OPENROUTER_API_KEY:-}
      - NANOBOT_PROVIDERS__OPENAI__APIKEY=${OPENAI_API_KEY:-}
      - NANOBOT_PROVIDERS__ANTHROPIC__APIKEY=${ANTHROPIC_API_KEY:-}
      - NANOBOT_PROVIDERS__GOOGLE__APIKEY=${GOOGLE_API_KEY:-}
      - NANOBOT_PROVIDERS__DEEPSEEK__APIKEY=${DEEPSEEK_API_KEY:-}
      # Gateway
      - NANOBOT_GATEWAY__HOST=0.0.0.0
      - NANOBOT_GATEWAY__PORT=18790
      # API server
      - NANOBOT_API__HOST=0.0.0.0
      - NANOBOT_API__PORT=8900
      # Channels (optional)
      - NANOBOT_CHANNELS__TELEGRAM__BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - NANOBOT_CHANNELS__DISCORD__BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - NANOBOT_CHANNELS__SLACK__BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - NANOBOT_CHANNELS__SLACK__SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
      - NANOBOT_CHANNELS__EMAIL__SMTP_HOST=${EMAIL_SMTP_HOST:-}
      - NANOBOT_CHANNELS__EMAIL__SMTP_PORT=${EMAIL_SMTP_PORT:-587}
      - NANOBOT_CHANNELS__EMAIL__SMTP_USER=${EMAIL_SMTP_USER:-}
      - NANOBOT_CHANNELS__EMAIL__SMTP_PASSWORD=${EMAIL_SMTP_PASSWORD:-}
      - NANOBOT_CHANNELS__EMAIL__FROM=${EMAIL_FROM:-}
      # Tools
      - NANOBOT_TOOLS__EXEC__SANDBOX=${NANOBOT_EXEC_SANDBOX:-}
    volumes:
      # Mount ~/.nanobot from host → persists config, workspace, memory, cron
      - nanobot-config:/home/nanobot/.nanobot
    healthcheck:
      test: ["CMD-SHELL", "nanobot status > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    init: true # proper signal handling (SIGTERM → nanobot)

  # ---------------------------------------------------------------------------
  # nanobot-cli — one-shot or interactive CLI (onboard, agent, etc.)
  # ---------------------------------------------------------------------------
  nanobot-cli:
    image: mitexleo/nanobot-docker:latest
    container_name: nanobot-cli
    profiles:
      - cli # only runs with: docker compose --profile cli run nanobot-cli ...
    environment:
      - NANOBOT_AGENTS__DEFAULTS__MODEL=${NANOBOT_MODEL:-anthropic/claude-sonnet-4-7}
      - NANOBOT_AGENTS__DEFAULTS__PROVIDER=${NANOBOT_PROVIDER:-openrouter}
      - NANOBOT_AGENTS__DEFAULTS__TIMEZONE=${NANOBOT_TIMEZONE:-UTC}
      - NANOBOT_PROVIDERS__OPENROUTER__APIKEY=${OPENROUTER_API_KEY:-}
      - NANOBOT_PROVIDERS__OPENAI__APIKEY=${OPENAI_API_KEY:-}
      - NANOBOT_PROVIDERS__ANTHROPIC__APIKEY=${ANTHROPIC_API_KEY:-}
      - NANOBOT_PROVIDERS__GOOGLE__APIKEY=${GOOGLE_API_KEY:-}
      - NANOBOT_PROVIDERS__DEEPSEEK__APIKEY=${DEEPSEEK_API_KEY:-}
      - NANOBOT_CHANNELS__TELEGRAM__BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - NANOBOT_CHANNELS__DISCORD__BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - NANOBOT_CHANNELS__SLACK__BOT_TOKEN=${SLACK_BOT_TOKEN:-}
      - NANOBOT_CHANNELS__SLACK__SIGNING_SECRET=${SLACK_SIGNING_SECRET:-}
    volumes:
      - nanobot-config:/home/nanobot/.nanobot
    stdin_open: true # -it
    tty: true
    init: true

volumes:
  # Stores: config.json, workspace/, memory/, cron/, sessions/
  nanobot-config:
    driver: local
